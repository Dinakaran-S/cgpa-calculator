version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: cgpa_calculator
      POSTGRES_USER: cgpa_user
      POSTGRES_PASSWORD: cgpa_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # Node.js backend
  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://cgpa_user:cgpa_pass@db:5432/cgpa_calculator
      JWT_SECRET: change_this_in_production_please
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports:
      - '5000:5000'
    depends_on:
      - db

  # React frontend (dev server)
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pgdata:
